{% extends "layout.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}

<div class="form-card">
    <h2 class="form-title">Create an Account</h2>

    {% if message %}
        <div class="form-error">{{ message }}</div>
    {% endif %}

    <form action="{{ url_for('signup') }}" method="post">
        <label class="form-label">Name</label>
        <input type="text" name="name" placeholder="Enter your name" class="form-input">

        <label class="form-label">Email</label>
        <input type="email" name="email" placeholder="Enter your email" class="form-input">

        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="Enter your password" class="form-input">

        <button type="submit" class="btn btn-full">Create Account</button>
    </form>

    <p class="form-login-prompt" style="margin-top: 20px;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>

{% endblock %}
