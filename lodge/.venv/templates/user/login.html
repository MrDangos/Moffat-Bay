{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}

<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='login.css') }}">


<div class="form-card">
    <h2 class="form-title">Welcome Back</h2>

    {% if message %}
        <div class="form-error">{{ message }}</div>
    {% endif %}

    <form action="{{ url_for('login') }}" method="post">
        <label class="form-label">Email</label>
        <input type="email" name="email" placeholder="Enter your email" class="form-input">

        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="Enter your password" class="form-input">

        <button type="submit" class="btn btn-full">Login</button>
    </form>

    <p class="form-login-prompt">
        Don't have an account? <a href="{{ url_for('signup') }}">Register here</a>
    </p>
</div>

{% endblock %}
