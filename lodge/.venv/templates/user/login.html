{% extends "layout.html" %}
{% block title %}
Login Page
{% endblock %}
{% block content %}
<div class="container">
    <h2 class="user"> User Login</h2>
    <form action="{{ url_for('login') }}" method="post">
        {% if message is defined and message %}
            <div style="color: red;"> <strong> {{ message }} ????</strong></div>
        {% endif %}  
        <br> 
        <label>Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email" name="email">

        <br> 
        <label class="pop"> <strong> Password:</strong></label>
        <input type="password"id="password" name="password" placeholder="Enter password" name="pswd">

        <button type="submit">Login</button>
        <p class="bottom">Don't have an account?  <a class="bottom" href="{{url_for('signup')}}"> Register here</a></p>
    </form>
</div>
{% endblock %}
