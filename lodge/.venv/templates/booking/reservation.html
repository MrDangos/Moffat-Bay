{% extends "layout.html" %}
{% block title %}
Reservation Page
{% endblock %}
{% block content %}
    <h1> Book Your Vacation </h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form action="/reservation/" method="post">
            <label for="numGuests">Number of Guests:</label><br>
            <input type="number" min="0" max="20" id="numGuests" name="numGuests"><br>

            <label for="roomid">Room Size:</label><br>
            <select id="roomid" name="roomid">
                {% for room in rooms %}
                    <option value="{{ room.roomid }}">
                        {{ room.room_name }} - ${{ room.nightly_rate }}/night
                    </option>
                {% endfor %}
            </select><br>
                
            <label for="checkin">Check-in Date:</label><br>
            <input type="date" id="checkin" name="checkin" min="{{ today }}"><br>

            <label for="checkout">Check-out Date:</label><br>
            <input type="date" id="checkout" name="checkout" min="{{ today }}"><br>

        {% if session.name %}    
                <input type="submit" value="Review Reservation">
        {% else %}
            To make a reservation, please <a href="/login">login</a>.
        {% endif %}
    </form>
{% endblock %}
