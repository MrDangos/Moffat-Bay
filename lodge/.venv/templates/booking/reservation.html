{% extends "layout.html" %}
{% block title %}
Reservation Page
{% endblock %}
{% block content %}
    <h1> Book Your Vacation </h1>
    <form action="/reservation/" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br>

            <label for="numGuests">Number of Guests:</label><br>
            <input type="number" id="numGuests" name="numGuests"><br>

            <label for="roomid">Room Size:</label><br>
            <select id="roomid" name="roomid">
                {% for room in rooms %}
                    <option value="{{ room.roomid }}">
                        {{ room.room_name }} - ${{ room.nightly_rate }}/night
                    </option>
                {% endfor %}
            </select><br>
                
            <label for="checkin">Check-in Date:</label><br>
            <input type="date" id="checkin" name="checkin"><br>

            <label for="checkout">Check-out Date:</label><br>
            <input type="date" id="checkout" name="checkout"><br><br>

        {% if session.name %}    
                <input type="submit" value="Review Reservation">
        {% else %}
            To make a reservation, please <a href="/login">login</a>.
        {% endif %}
    </form>
{% endblock %}
